<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G5 Controller OSC Sender</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; }
        button { width: 220px; padding: 15px; margin: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>G5 Controller OSC Sender</h1>

    <button onclick="sendOSC('/chart/prev', [{ type: 'i', value: 1 }])">Prev Chart</button>
    <button onclick="sendOSC('/chart/next', [{ type: 'i', value: 1 }])">Next Chart</button>

    <script>
        let ws;

        const wsServer = location.hostname === "localhost"
            ? `ws://${location.hostname}:4000`
            : `wss://${location.hostname}`;

        function connectWS() {
            ws = new WebSocket(wsServer);

            ws.onopen = () => console.log("✅ Connected to WebSocket");
            ws.onclose = () => {
                console.log("❌ WebSocket closed, reconnecting in 2s...");
                setTimeout(connectWS, 2000);
            };
            ws.onerror = (err) => console.error("WebSocket Error:", err);

            ws.onmessage = (msg) => {
                console.log("| Received:", msg.data);
                // Ici tu peux traiter d'autres messages du serveur
            };
        }

        function sendOSC(address, args) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.warn("WebSocket not connected yet");
                return;
            }

            const msg = {
                type: "sendOSC",
                address: address,
                args: JSON.stringify(args)
            };

            ws.send(JSON.stringify(msg));
            console.log("📤 Sent OSC:", msg);
        }

        document.addEventListener("DOMContentLoaded", connectWS);
    </script>
</body>
</html>
